### -----------------------------------------
### Bluetooth
# Set the keyboard BT name
CONFIG_ZMK_KEYBOARD_NAME="Prototype_Mk1"

### -----------------------------------------
### BASIC
CONFIG_ZMK_SPLIT_ROLE_CENTRAL=y

### OLED DISPLAY
# Custom Display
CONFIG_ZMK_DISPLAY=y
CONFIG_ZMK_DISPLAY_STATUS_SCREEN_CUSTOM=y
# Peripheral artwork is driven by the local nice_view_gem theme system, which
# animates by default (CONFIG_NICE_VIEW_ANIMATION=y; default theme set in Kconfig).

### -----------------------------------------
### Power
# Sleep
CONFIG_ZMK_SLEEP=y
CONFIG_ZMK_IDLE_SLEEP_TIMEOUT=1200000
CONFIG_ZMK_IDLE_TIMEOUT=180000
CONFIG_ZMK_BACKLIGHT_AUTO_OFF_IDLE=y

# Better BT range
CONFIG_BT_CTLR_TX_PWR_PLUS_8=y

# 3 profiles (n+1)
CONFIG_BT_MAX_CONN=6
CONFIG_BT_MAX_PAIRED=6

# combo config
CONFIG_ZMK_COMBO_MAX_COMBOS_PER_KEY=7

# battery reporting. Fetch is the ZMK #3156 trigger; reconnect reliability here comes
# from the zmk FORK central.c fix (deferred subscribe + own disc_params + self-heal),
# not any config on these lines. This central-left path has encoders too, so the
# sensor disc_params separation in that fix matters for it. See docs/issues.md (S2).
CONFIG_ZMK_SPLIT_BLE_CENTRAL_BATTERY_LEVEL_FETCHING=y
CONFIG_ZMK_SPLIT_BLE_CENTRAL_BATTERY_LEVEL_PROXY=y

# Compatability
#CONFIG_ZMK_HID_CONSUMER_REPORT_USAGES_BASIC=y

# Turn on logging, and set ZMK logging to debug output
# CONFIG_ZMK_USB_LOGGING=y
# CONFIG_LOG_PROCESS_THREAD_STARTUP_DELAY_MS=8000 
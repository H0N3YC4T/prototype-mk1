### -----------------------------------------
### OLED DISPLAY
# Custom Display
CONFIG_ZMK_DISPLAY=y
CONFIG_ZMK_DISPLAY_STATUS_SCREEN_CUSTOM=y
CONFIG_NICE_VIEW_ANIMATION=y
CONFIG_NICE_VIEW_ANIMATION_MS=330000

### -----------------------------------------
### Power
# Sleep
CONFIG_ZMK_SLEEP=y
CONFIG_ZMK_IDLE_SLEEP_TIMEOUT=1200000
CONFIG_ZMK_IDLE_TIMEOUT=180000
CONFIG_ZMK_BACKLIGHT_AUTO_OFF_IDLE=y

### -----------------------------------------
### Bluetooth
# Set the keyboard BT name
CONFIG_ZMK_KEYBOARD_NAME="Prototype_Mk1"

# better range
CONFIG_BT_CTLR_TX_PWR_PLUS_8=y

# 3 profiles (n+1)
CONFIG_BT_MAX_CONN=4
CONFIG_BT_MAX_PAIRED=4

# combo config
CONFIG_ZMK_COMBO_MAX_COMBOS_PER_KEY=7

# battery reporting
CONFIG_ZMK_SPLIT_BLE_CENTRAL_BATTERY_LEVEL_FETCHING=y
CONFIG_ZMK_SPLIT_BLE_CENTRAL_BATTERY_LEVEL_PROXY=y

# Compatability
CONFIG_ZMK_HID_CONSUMER_REPORT_USAGES_BASIC=y

# Turn on logging, and set ZMK logging to debug output
# CONFIG_ZMK_USB_LOGGING=y
CONFIG_LOG_PROCESS_THREAD_STARTUP_DELAY_MS=8000 
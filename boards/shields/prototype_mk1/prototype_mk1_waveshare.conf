### -----------------------------------------
### XIAO nRF52840 + Waveshare 1.69" prospector receiver dongle

### Prospector status screen: OPERATOR theme
CONFIG_PROSPECTOR_STATUS_SCREEN_OPERATOR=y

### DIY XIAO + Waveshare builds typically have no APDS9960 ambient-light sensor,
### so use a fixed display brightness (this is what makes brightness control
### actually work). If your board DOES have the sensor, set
### CONFIG_PROSPECTOR_USE_AMBIENT_LIGHT_SENSOR=y and drop the fixed brightness.
CONFIG_PROSPECTOR_USE_AMBIENT_LIGHT_SENSOR=n
CONFIG_PROSPECTOR_FIXED_BRIGHTNESS=80

### Note: CONFIG_ZMK_BACKLIGHT / CONFIG_ZMK_EXT_POWER are set globally by
### config/prototype_mk1.conf (which merges last and targets the nice!nano
### halves). The XIAO dongle has no such hardware, so they are disabled for this
### target via cmake-args in build.yaml.

### -----------------------------------------
### Fix for ZMK #3156 (battery-fetch starves key-position discovery on a dongle).
### With CONFIG_ZMK_SPLIT_BLE_CENTRAL_BATTERY_LEVEL_FETCHING on (prospector
### enables it), the central's CONCURRENT GATT discovery of BOTH peripherals
### shares one ATT TX buffer pool; the battery-characteristic discovery can race
### the key-position one and exhaust the pool before the position characteristic
### is found -> battery shows but NO keys register, on BOTH halves. ZMK bumps
### BT_ATT_TX_COUNT to 10 for a split central; the heavy prospector colour display
### on the XIAO tightens the timing enough that 10 is not sufficient, so bump it.
### Guaranteed fallback if keys still don't register: disable battery fetching
### with CONFIG_ZMK_SPLIT_BLE_CENTRAL_BATTERY_LEVEL_FETCHING=n (loses the
### peripheral battery widget but removes the interfering discovery entirely).
CONFIG_BT_ATT_TX_COUNT=20

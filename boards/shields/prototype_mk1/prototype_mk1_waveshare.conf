### XIAO nRF52840 + Waveshare 1.69" prospector receiver dongle

### Prospector status screen: OPERATOR theme
CONFIG_PROSPECTOR_STATUS_SCREEN_OPERATOR=y

### DIY XIAO + Waveshare builds typically have no APDS9960 ambient-light sensor,
### so use a fixed display brightness (this is what makes brightness control
### actually work). If your board DOES have the sensor, set
### CONFIG_PROSPECTOR_USE_AMBIENT_LIGHT_SENSOR=y and drop the fixed brightness.
CONFIG_PROSPECTOR_USE_AMBIENT_LIGHT_SENSOR=n
CONFIG_PROSPECTOR_FIXED_BRIGHTNESS=80

### Note: CONFIG_ZMK_BACKLIGHT / CONFIG_ZMK_EXT_POWER are set globally by
### config/prototype_mk1.conf (which merges last and targets the nice!nano
### halves). Backlight is kept enabled so the GLOBAL-locality &bl behaviour
### relays to the halves (prototype_mk1_waveshare.overlay adds a placeholder
### zmk,backlight node for the assert). Ext-power has no hardware here and is
### disabled via cmake-args in build.yaml.

### USB-powered receiver dongle: never deep-sleep, so it stays awake to accept a
### reconnection when a half wakes from its own sleep (matches the nano dongle in
### prototype_mk1_dongle.conf). The halves still sleep to save battery.
CONFIG_ZMK_SLEEP=n

### Split reconnect fix (ZMK #3156). With battery fetching on (the prospector
### battery display sets CONFIG_ZMK_SPLIT_BLE_CENTRAL_BATTERY_LEVEL_FETCHING),
### subscribing to a peripheral's battery characteristic kicks off a nested GATT
### CCC discovery that can abort the in-progress position-state discovery -> the
### half links but never subscribes to key positions, and stays broken until the
### dongle is power-cycled. ZMK's fix (PR #3216) enlarges the ATT TX buffer pool
### via CONFIG_BT_ATT_TX_COUNT -- the symbol newer Zephyr actually uses; the old
### BT_L2CAP_TX_BUF_COUNT no longer drives ATT. ZMK already defaults this to 10
### for a split central (so a current main build alone helps); raise it for our
### heavier load: 2 peripherals + battery fetch + prospector + 3 host profiles.
CONFIG_BT_ATT_TX_COUNT=20

### --- Touch (CST816S on the Waveshare panel, shared &i2c1 bus) ---
### Zephyr input subsystem + the CST816S driver; taps + trackpad gestures are
### decoded by the dongle-mk1 module (src/touch/tools/touch_input.c, gated on the
### cst816s DT node in the overlay) and dispatched to its on-screen touch UI.
### (The macro behaviour auto-enables from the zmk,behavior-macro nodes; do NOT set
### CONFIG_ZMK_BEHAVIOR_MACRO here -- it has no prompt and ZMK CI rejects the assign.)
CONFIG_INPUT=y
CONFIG_INPUT_CST816S=y

### USB CDC logging: OFF now that touch calibration is done. Beyond the RAM/flash
### cost, the INF-level tap logs ("tap ... -> cell N") reveal what is typed on the
### touch numpad/symbols pages to anything watching the serial port. Re-enable
### TEMPORARILY (=y) to watch for the reconnect fix's success marker
### ("Position-state subscription established") during sleep/wake verification.
CONFIG_ZMK_USB_LOGGING=n

### The touch UI's numpad draws a 4x4 grid = ~32 LVGL objects, ~2x any other screen.
### The OPERATOR layout defaults LV_Z_MEM_POOL_SIZE to 20 KB, which the numpad can
### exhaust -> lv_obj_create() returns NULL -> crash on that page. Bump it, but RAM is
### the ceiling here: 32768 overflowed RAM by ~5 KB. Right-sizing the behavior queue
### (512->64 via build.yaml cmake-args) freed ~10.7 KB, part reinvested here: 28 KB
### gives the 4x4 operator numpad (~32 objects) headroom. draw_cell also NULL-guards,
### so a shortfall degrades to a missing cell, not a crash.
CONFIG_LV_Z_MEM_POOL_SIZE=28672

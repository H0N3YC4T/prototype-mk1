### XIAO nRF52840 + Waveshare 1.69" prospector receiver dongle

### Prospector status screen: OPERATOR theme
CONFIG_PROSPECTOR_STATUS_SCREEN_OPERATOR=y

### DIY XIAO + Waveshare builds typically have no APDS9960 ambient-light sensor,
### so use a fixed display brightness (this is what makes brightness control
### actually work). If your board DOES have the sensor, set
### CONFIG_PROSPECTOR_USE_AMBIENT_LIGHT_SENSOR=y and drop the fixed brightness.
CONFIG_PROSPECTOR_USE_AMBIENT_LIGHT_SENSOR=n
CONFIG_PROSPECTOR_FIXED_BRIGHTNESS=80

### Note: CONFIG_ZMK_BACKLIGHT / CONFIG_ZMK_EXT_POWER are set globally by
### config/prototype_mk1.conf (which merges last and targets the nice!nano
### halves). The XIAO dongle has no such hardware, so they are disabled for this
### target via cmake-args in build.yaml.

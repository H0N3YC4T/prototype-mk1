### -----------------------------------------
### XIAO nRF52840 + Waveshare 1.69" prospector receiver dongle

### Prospector status screen: OPERATOR theme
CONFIG_PROSPECTOR_STATUS_SCREEN_OPERATOR=y

### no APDS9960 fitted -> fixed brightness (required for brightness control)
CONFIG_PROSPECTOR_USE_AMBIENT_LIGHT_SENSOR=n
CONFIG_PROSPECTOR_FIXED_BRIGHTNESS=80

### backlight/ext-power come from the global conf (backlight relays to the halves)
### USB-powered receiver: never deep-sleep, stays awake for half reconnects
CONFIG_ZMK_SLEEP=n

### ATT margin for ZMK #3156 (2 periphs + battery fetch + host profiles); the real
### fix is the zmk fork central.c -- see information.md section 9
CONFIG_BT_ATT_TX_COUNT=20

### CST816S touch (shared &i2c1); gestures decoded by the dongle-mk1 module
CONFIG_INPUT=y
CONFIG_INPUT_CST816S=y

### off: tap logs leak typed keys over serial; =y temporarily to watch the
### reconnect marker ("Position-state subscription established")
CONFIG_ZMK_USB_LOGGING=n

### 28K: the 4x4 numpad exhausts the 20K default; 32K overflows RAM (info.md s7)
CONFIG_LV_Z_MEM_POOL_SIZE=28672

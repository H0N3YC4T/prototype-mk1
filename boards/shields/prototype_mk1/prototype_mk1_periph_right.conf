### -----------------------------------------
### BASIC
CONFIG_ZMK_SPLIT_ROLE_CENTRAL=n

### Power
# Sleep
CONFIG_ZMK_SLEEP=y
CONFIG_ZMK_IDLE_SLEEP_TIMEOUT=1200000
CONFIG_ZMK_IDLE_TIMEOUT=180000
CONFIG_ZMK_BACKLIGHT_AUTO_OFF_IDLE=y

### -----------------------------------------
### OLED DISPLAY
# Custom Display
CONFIG_ZMK_DISPLAY=y
CONFIG_ZMK_DISPLAY_STATUS_SCREEN_CUSTOM=y
# Stock M165437 nice-view-gem animates by default (CONFIG_NICE_VIEW_GEM_ANIMATION=y).
# The custom transmutation theme + slow-anim are deferred (see deferred-features/).
### -----------------------------------------
### Bluetooth
# Power Boost
CONFIG_BT_CTLR_TX_PWR_PLUS_8=y


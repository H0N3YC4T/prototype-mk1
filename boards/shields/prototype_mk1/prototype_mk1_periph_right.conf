### Right half as peripheral (dongle is the central).

CONFIG_ZMK_SPLIT_ROLE_CENTRAL=n

### Power
# sleep off (zmk default): battery experiment 2026-07-15
CONFIG_ZMK_SLEEP=n
CONFIG_ZMK_IDLE_TIMEOUT=30000
CONFIG_ZMK_BACKLIGHT_AUTO_OFF_IDLE=y
# stops idle redraw ticks; the memory LCD keeps its last image (no DISP pin)
CONFIG_ZMK_DISPLAY_BLANK_ON_IDLE=y

### nice!view via nice-view-mk1: all four themes; boots paused, NVC_PAUSE plays/stops
CONFIG_ZMK_DISPLAY=y
CONFIG_ZMK_DISPLAY_STATUS_SCREEN_CUSTOM=y
CONFIG_NICE_VIEW_MK1_TRANSMUTATION_ONLY=n
CONFIG_NICE_VIEW_ANIMATION=y
CONFIG_NICE_VIEW_ANIMATION_AUTOSTART=n

### Bluetooth
CONFIG_BT_CTLR_TX_PWR_PLUS_8=y

### accept the dongle's 3.0ms sub-spec split interval (interval itself is central-set)
CONFIG_BT_CTLR_ADVANCED_FEATURES=y
CONFIG_BT_CTLR_CONN_INTERVAL_LOW_LATENCY=y
CONFIG_BT_CONN_PARAM_ANY=y

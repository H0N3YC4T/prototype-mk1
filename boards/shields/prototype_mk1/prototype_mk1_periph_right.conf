### Right half as peripheral (dongle is the central).

CONFIG_ZMK_SPLIT_ROLE_CENTRAL=n

### Power
CONFIG_ZMK_SLEEP=y
CONFIG_ZMK_IDLE_SLEEP_TIMEOUT=1200000
CONFIG_ZMK_IDLE_TIMEOUT=180000
CONFIG_ZMK_BACKLIGHT_AUTO_OFF_IDLE=y

### Display (nice!view via the nice-view-mk1 module). Artwork is a single static
### transmutation frame by default (NICE_VIEW_ANIMATION=n in the module Kconfig).
CONFIG_ZMK_DISPLAY=y
CONFIG_ZMK_DISPLAY_STATUS_SCREEN_CUSTOM=y

### Bluetooth
CONFIG_BT_CTLR_TX_PWR_PLUS_8=y

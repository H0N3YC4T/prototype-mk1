### -----------------------------------------
### CENTRAL SETTINGS
# NAME + ROLE
CONFIG_ZMK_KEYBOARD_NAME="Prototype_Mk2"
CONFIG_ZMK_SPLIT_ROLE_CENTRAL=y

# DONGLE SETING
CONFIG_ZMK_SPLIT_BLE_CENTRAL_PERIPHERALS=2

# PROFILES
CONFIG_BT_MAX_CONN=7
CONFIG_BT_MAX_PAIRED=7

# COMBO
CONFIG_ZMK_COMBO_MAX_COMBOS_PER_KEY=7

### -----------------------------------------
### OLED DISPLAY
# Custom Display
CONFIG_ZMK_DISPLAY=y
CONFIG_ZMK_DISPLAY_STATUS_SCREEN_CUSTOM=y
CONFIG_ZMK_DONGLE_DISPLAY_LAYER_TEXT_ALIGN="right"
CONFIG_ZMK_DONGLE_DISPLAY_LAYER_NAME_SCROLL_WIDTH=75

### -----------------------------------------
### Power
# Sleep
CONFIG_ZMK_SLEEP=n
CONFIG_ZMK_IDLE_TIMEOUT=180000

# BATTERY. Fetch is the ZMK #3156 trigger (nested CCC discovery during the peripheral
# char walk). Reconnect reliability comes from the zmk FORK's central.c fix (deferred
# subscribe + separate disc_params + self-heal), NOT from any config on this line, and
# NOT from BT_MAX_CONN=7 above (that's margin, not the fix). See docs/issues.md (S2).
CONFIG_ZMK_SPLIT_BLE_CENTRAL_BATTERY_LEVEL_FETCHING=y

# COMPATIBILITY
CONFIG_ZMK_HID_CONSUMER_REPORT_USAGES_BASIC=y


### -----------------------------------------
# LOGGING
# CONFIG_ZMK_USB_LOGGING=y

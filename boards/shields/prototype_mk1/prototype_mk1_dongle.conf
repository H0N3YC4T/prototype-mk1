### nice!nano receiver dongle with the englmaxi dongle_display (target currently
### disabled in build.yaml; the waveshare dongle is the active receiver).

CONFIG_ZMK_KEYBOARD_NAME="Prototype_Mk1"
CONFIG_ZMK_SPLIT_ROLE_CENTRAL=y
CONFIG_ZMK_SPLIT_BLE_CENTRAL_PERIPHERALS=2

### Bluetooth: 2 peripherals + host profiles
CONFIG_BT_MAX_CONN=5
CONFIG_BT_MAX_PAIRED=5

CONFIG_ZMK_COMBO_MAX_COMBOS_PER_KEY=7

### Display (zmk-dongle-display module)
CONFIG_ZMK_DISPLAY=y
CONFIG_ZMK_DISPLAY_STATUS_SCREEN_CUSTOM=y
CONFIG_ZMK_DONGLE_DISPLAY_LAYER_TEXT_ALIGN="right"
CONFIG_ZMK_DONGLE_DISPLAY_LAYER_NAME_SCROLL_WIDTH=75

### Power: USB-powered, never deep-sleep (stays awake for half reconnects)
CONFIG_ZMK_SLEEP=n
CONFIG_ZMK_IDLE_TIMEOUT=180000

CONFIG_ZMK_SPLIT_BLE_CENTRAL_BATTERY_LEVEL_FETCHING=y
CONFIG_ZMK_HID_CONSUMER_REPORT_USAGES_BASIC=y

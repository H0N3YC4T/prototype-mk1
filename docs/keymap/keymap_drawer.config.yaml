draw_config:
  n_columns: 1
  dark_mode: false
  footer_text: Prototype_Mk1
  svg_extra_style: |
    rect.number   { fill: #a8d0e6; }
    rect.fkey     { fill: #8ca8e6; }
    rect.mod      { fill: #c8a2c8; }
    rect.nav      { fill: #8cd9c8; }
    rect.sym      { fill: #f5e08c; }
    rect.media    { fill: #f5b98c; }
    rect.system   { fill: #e8909d; }
    rect.layer    { fill: #a8e6b8; }
    rect.macro    { fill: #f0e8d8; }
    rect.ghost    { fill: #f5f5f5; }
    .ghost text   { fill: #a8a8a8; }
    rect.encoder  { fill: #eceff1; rx: 48px; ry: 48px; stroke-width: 2px; }

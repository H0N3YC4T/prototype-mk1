manifest:
  remotes:
    - name: zmkfirmware
      url-base: https://github.com/zmkfirmware
    - name: englmaxi
      url-base: https://github.com/englmaxi
    - name: honeycat
      url-base: https://github.com/H0N3YC4T
  projects:
    - name: zmk
      remote: zmkfirmware
      # Pinned to a validated ZMK main commit (Zephyr 4.1 / LVGL 9.3).
      # Bump deliberately and re-test; see MIGRATION_NOTES.md.
      revision: 64daf698e073e37b6748ac54f4eb48d8666af0b9
      import: app/west.yml
    # Dongle display — LVGL-9/Zephyr-4.1. Replaces the previously-vendored
    # boards/shields/dongle_display copy. Known-good HEAD: 2bb333f (pin at end).
    - name: zmk-dongle-display
      remote: englmaxi
      revision: 2bb333f87136d33e94a49d86236ed9ec254a8060
    # nice_view_gem is now a LOCAL vendored shield (boards/shields/nice_view_gem),
    # re-vendored from M165437/nice-view-gem @ 0a50fe2 (LVGL 9) so the custom theme
    # system + images can be layered on. The M165437 module reference was removed.
    # Prospector display dongle (XIAO + Waveshare 1.69"). FORK of carrefinho's
    # prospector-zmk-module @ feat/new-status-screens, carrying our custom OPERATOR
    # theme (lilac WPM, battery tiers). Tracked (not pinned) while we iterate the
    # theme; pin to a SHA once it settles.
    - name: prospector-zmk-module
      remote: honeycat
      revision: feat/new-status-screens
  self:
    path: config

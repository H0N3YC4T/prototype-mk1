    - name: zmk-dongle-display
      remote: englmaxi
      revision: main
    # nice!view_gem display — LVGL-9/Zephyr-4.1. Replaces the previously-vendored
    # boards/shields/nice_view_gem copy; the custom theme work is preserved in
    # deferred-features/nice_view_gem_theme/. Known-good HEAD: 0a50fe2 (pin at end).
    - name: nice-view-gem
      remote: M165437
      revision: main
  self:
    path: config

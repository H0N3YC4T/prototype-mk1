---
include:
  - board: nice_nano//zmk
    shield: settings_reset
    artifact-name: reset

  # Settings-reset for the XIAO dongle. A UF2 flash does NOT wipe the
  # settings/NVS partition, so stale BLE bonds from earlier pairing attempts
  # persist on the XIAO and cause "Security failed ... level 1 err 2"
  # (PIN_OR_KEY_MISSING) -> the key-position subscription is torn down -> no
  # keys. The `reset` artifact above is nice_nano-only, so the XIAO could never
  # be cleared. Flash this to the XIAO to wipe its bonds, then flash the dongle.
  - board: xiao_ble//zmk
    shield: settings_reset
    artifact-name: reset-waveshare

  # Zephyr 4.1 / LVGL 9.3 migration complete: all display-bearing targets below
  # build green on the HWMv2 `nice_nano//zmk` board id. See MIGRATION_NOTES.md.

  # -------------- CONTROLLERS --------------

  # nice_view_adapter is listed before prototype_mk1_dongle so its &nice_view_spi
  # bus label is defined before prototype_mk1_dongle.overlay references it.
  - board: nice_nano//zmk
    shield: nice_view_adapter prototype_mk1_dongle dongle_display
    artifact-name: dongle

  # XIAO nRF52840 + Waveshare 1.69" prospector dongle. Display/brightness/themes
  # come from prospector_adapter. Backlight stays ENABLED (from the global
  # config/prototype_mk1.conf) so the GLOBAL-locality &bl behaviour relays to the
  # halves; the XIAO has no backlight LED, so prototype_mk1_waveshare.overlay adds
  # a placeholder zmk,backlight node to satisfy ZMK's build assert. Ext-power is
  # still disabled here (no such hardware on the XIAO, and no &ext_power key).
  # Behavior-queue is right-sized DOWN here (global config/prototype_mk1.conf sets 512
  # for the halves' long macros; on the dongle that static K_MSGQ costs ~12 KB of RAM
  # for a queue the touch UI puts 2 entries in per tap). cmake-args is the only lever
  # that beats the global conf's last-merge; freed RAM is partly reinvested in the LVGL
  # pool (prototype_mk1_waveshare.conf). Do NOT move the 512 out of the global conf --
  # the halves need it.
  - board: xiao_ble//zmk
    shield: prototype_mk1_waveshare prospector_adapter
    cmake-args: -DCONFIG_ZMK_EXT_POWER=n -DCONFIG_ZMK_BEHAVIORS_QUEUE_SIZE=64
    artifact-name: dongle-waveshare

  - board: nice_nano//zmk
    shield: prototype_mk1_central_left nice_view_adapter nice_view_gem
    artifact-name: central-left

  # -------------- PERIPHERALS --------------

  - board: nice_nano//zmk
    shield: prototype_mk1_periph_left nice_view_adapter nice_view_gem
    artifact-name: left

  - board: nice_nano//zmk
    shield: prototype_mk1_periph_right nice_view_adapter nice_view_gem
    artifact-name: right

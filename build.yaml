---
include:
  - board: nice_nano_v2
    shield: settings_reset
    artifact-name: reset

  - board: nice_nano_v2
    shield: prototype_mk1_dongle nice_view_adapter nice_view_gem
    artifact-name: dongle
    cmake-args: -DCONFIG_ZMK_SPLIT=y -DCONFIG_ZMK_SPLIT_ROLE_CENTRAL=y

  - board: nice_nano_v2
    shield: prototype_mk1_dongle
    artifact-name: dongle_temp
    cmake-args: -DCONFIG_ZMK_DISPLAY_STATUS_SCREEN_CUSTOM=n -DCONFIG_ZMK_DISPLAY_STATUS_SCREEN_BUILT_IN=y

  - board: nice_nano_v2
    shield: prototype_mk1_central_left nice_view_adapter nice_view_gem
    artifact-name: left-central
    cmake-args: -DCONFIG_ZMK_SPLIT=y -DCONFIG_ZMK_SPLIT_ROLE_CENTRAL=y

  - board: nice_nano_v2
    shield: prototype_mk1_periph_left nice_view_adapter nice_view_gem
    artifact-name: left-peripheral
    cmake-args: -DCONFIG_ZMK_SPLIT=y -DCONFIG_ZMK_SPLIT_ROLE_CENTRAL=n -DCONFIG_NICE_VIEW_ANIMATION_THEME_TRANSMUTATION=y

  - board: nice_nano_v2
    shield: prototype_mk1_periph_right nice_view_adapter nice_view_gem
    artifact-name: right-peripheral
    cmake-args: -DCONFIG_ZMK_SPLIT=y -DCONFIG_ZMK_SPLIT_ROLE_CENTRAL=n -DCONFIG_NICE_VIEW_ANIMATION_THEME_TRANSMUTATION=y

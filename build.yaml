---
include:
  - board: nice_nano//zmk
    shield: settings_reset
    artifact-name: reset

  # NOTE (zeph-4.1 migration): the display-bearing targets below are
  # temporarily disabled until the nice_view_gem / dongle_display widgets are
  # migrated to LVGL 9.3. Board IDs are already updated to the HWMv2
  # `nice_nano//zmk` form. Re-enable these incrementally as the LVGL migration
  # lands. See MIGRATION_NOTES.md.

  # -------------- CONTROLLERS --------------

  # nice_view_adapter is listed before prototype_mk1_dongle so its &nice_view_spi
  # bus label is defined before prototype_mk1_dongle.overlay references it.
  - board: nice_nano//zmk
    shield: nice_view_adapter prototype_mk1_dongle dongle_display
    artifact-name: dongle

  - board: nice_nano//zmk
    shield: prototype_mk1_central_left nice_view_adapter nice_view_gem
    artifact-name: central-left

  # -------------- PERIPHERALS --------------

  - board: nice_nano//zmk
    shield: prototype_mk1_periph_left nice_view_adapter nice_view_gem
    artifact-name: left

  - board: nice_nano//zmk
    shield: prototype_mk1_periph_right nice_view_adapter nice_view_gem
    artifact-name: right

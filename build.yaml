---
include:
  - board: nice_nano_v2
    shield: settings_reset
    artifact-name: reset

  - board: nice_nano_v2
    shield: prototype_mk1_dongle oled_adapter_pro_micro_128x32
    artifact-name: dongle


  - board: nice_nano_v2
    shield: prototype_mk1_dongle dongle_display
    artifact-name: dongle-custom
    cmake-args: -DCONFIG_BT_BAS=n -DCONFIG_ZMK_DISPLAY_STATUS_SCREEN_BUILT_IN=y -DCONFIG_ZMK_SLEEP=n

  - board: nice_nano_v2
    shield: prototype_mk1_central_left nice_view_adapter nice_view_gem
    artifact-name: left-central




  - board: nice_nano_v2
    shield: prototype_mk1_periph_left nice_view_adapter nice_view_gem
    artifact-name: left-peripheral
    cmake-args: -DCONFIG_ZMK_SPLIT=y -DCONFIG_ZMK_SPLIT_ROLE_CENTRAL=n -DCONFIG_NICE_VIEW_ANIMATION_THEME_TRANSMUTATION=y

  - board: nice_nano_v2
    shield: prototype_mk1_periph_right nice_view_adapter nice_view_gem
    artifact-name: right-peripheral
    cmake-args: -DCONFIG_ZMK_SPLIT=y -DCONFIG_ZMK_SPLIT_ROLE_CENTRAL=n -DCONFIG_NICE_VIEW_ANIMATION_THEME_TRANSMUTATION=y
